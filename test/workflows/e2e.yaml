  #       id: ccip-send
  #       env:
  #         W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
  #       bridge-allow: [ethereum/call-contract]
  #       with:
  #         command: ccip-send
  #         source-chain: base-sepolia
  #         destination-chain: sepolia
  #         receiver: '0xe4E402962943c4EB2253f666575eE12700e78e90'
  #         fee-token: native
  #         data: '0xdeadbeef'
  #         rpc-url: ${{ secrets.ALCHEMY_BASE_SEPOLIA_RPC }}
  #     # ccip-estimate-fee (read-only)
  #     - uses: w3-io/w3-chainlink-action@main
  #       id: ccip-fee
  #       with:
  #         command: ccip-estimate-fee
  #         source-chain: base
  #         destination-chain: ethereum
  #         receiver: '0xe4E402962943c4EB2253f666575eE12700e78e90'
  #         fee-token: native
  #
  #     # ccip-send (requires funded wallet with LINK or native token)
  #     # - uses: w3-io/w3-chainlink-action@main
  #     #   id: ccip-send
  #     #   env:
  #     #     W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
  #     #   bridge-allow:
  #     #     - ethereum/call-contract
  #     #   with:
  #     #     command: ccip-send
  #     #     source-chain: base
  #     #     destination-chain: ethereum
  #     #     receiver: '0xe4E402962943c4EB2253f666575eE12700e78e90'
  #     #     fee-token: native
  #
  #     - run: |
  #         echo "=== CCIP Fee Estimate ==="
  #         echo "${{ steps.ccip-fee.outputs.result }}"

  # ── VRF writes (consumer deployed at 0x292D…D241 on Sepolia) ────
  # Subscription 71807…247411 is funded (4 LINK), owner = bridge
  # signer, consumer = W3VRFConsumer at 0x292D6d64603Dc555541E6aa8Db19Ed145479D241.
  # Live-verified via cast: addConsumer tx 0x9405fae6…, requestRandomWords
  # tx 0x095bd846…. Fulfillment proven by RandomWordsFulfilled event
  # on the coordinator. This workflow runs the same path via the bridge.
  #
  # vrf-get-subscription stays SKIPPED — the bridge's alloy-based
  # decoder fails on (uint96, uint96, uint64, address, address[]) with
  # "buffer overrun while deserializing" on the dynamic address[] tail.
  # Verified via raw cast that the on-chain return is well-formed.
  # Protocol-side fix needed.
  vrf-writes:
    runs-on: ubuntu-latest
    steps:
      # vrf-request: consumer is already added to the sub, so this
      # is the minimal end-to-end check (request → fulfilled event).
      - uses: w3-io/w3-chainlink-action@main
        id: vrf-request
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: vrf-request
          chain: sepolia
          subscription-id: '71807528537906860133404221822604258614766191788723848022770699723800904247411'
          consumer-contract: '0x292D6d64603Dc555541E6aa8Db19Ed145479D241'
          num-words: '1'
          callback-gas-limit: '100000'
          request-confirmations: '3'
          rpc-url: ${{ secrets.W3_RPC_ETHEREUM_SEPOLIA }}

      - run: |
          echo "=== VRF Request ==="
          echo "${{ steps.vrf-request.outputs.result }}"

  # ── Functions (read-only against existing sub 6491) ────────────
  # Sub 6491 on Ethereum Sepolia is owned by a different wallet; read
  # is unrestricted so this validates the bridge's Functions Router
  # decoder against a real Subscription struct. Write-path exercise
  # deferred until we have a signer-owned Functions sub.
  functions-read:
    runs-on: ubuntu-latest
    steps:
      - uses: w3-io/w3-chainlink-action@main
        id: func-get
        with:
          command: functions-get-subscription
          chain: sepolia
          subscription-id: '6491'
          rpc-url: ${{ secrets.W3_RPC_ETHEREUM_SEPOLIA }}

      - run: |
          echo "=== Functions Subscription 6491 ==="
          echo "${{ steps.func-get.outputs.result }}"
