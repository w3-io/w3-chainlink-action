# E2E Test Workflow
#
# Exercises every command against real APIs/contracts.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "Chainlink E2E" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_ETHEREUM (bridge signer for write commands)
#   - VRF/Functions commands need funded subscriptions (see comments)

name: Chainlink E2E
on:
  workflow_dispatch: {}

jobs:
  # ── Price Feeds (read-only) ─────────────────────────────────────
  price-feeds:
    runs-on: ubuntu-latest
    steps:
      # get-price: ETH/USD
      - uses: w3-io/w3-chainlink-action@main
        id: eth-price
        with:
          command: get-price
          pair: ETH/USD
          chain: base

      # get-price: BTC/USD
      - uses: w3-io/w3-chainlink-action@main
        id: btc-price
        with:
          command: get-price
          pair: BTC/USD
          chain: base

      # get-price: LINK/USD
      #       - uses: w3-io/w3-chainlink-action@main
      #         id: link-price
      #         with:
      #           command: get-price
      #           pair: LINK/USD
      #           chain: base

      # get-feed-info: ETH/USD
      - uses: w3-io/w3-chainlink-action@main
        id: feed-info
        with:
          command: get-feed-info
          pair: ETH/USD
          chain: base

      # list-feeds
      - uses: w3-io/w3-chainlink-action@main
        id: list-feeds
        with:
          command: list-feeds
          chain: base

      - run: |
          echo "=== ETH/USD ==="
          echo "${{ steps.eth-price.outputs.result }}"
          echo "=== BTC/USD ==="
          echo "${{ steps.btc-price.outputs.result }}"
          echo "=== Feed Info ==="
          echo "${{ steps.feed-info.outputs.result }}"
          echo "=== List Feeds ==="
          echo "${{ steps.list-feeds.outputs.result }}"

  # ── Proof of Reserve (read-only) ────────────────────────────────
  proof-of-reserve:
    runs-on: ubuntu-latest
    steps:
      - uses: w3-io/w3-chainlink-action@main
        id: por
        with:
          command: por-get-reserves
          pair: WBTC/BTC
          chain: ethereum
          rpc-url: https://ethereum-rpc.publicnode.com

      - run: |
          echo "=== Proof of Reserve ==="
          echo "${{ steps.por.outputs.result }}"

  # ── CCIP fee estimation (read-only) ─────────────────────────────
  ccip-read:
    runs-on: ubuntu-latest
    steps:
      - uses: w3-io/w3-chainlink-action@main
        id: ccip-fee-mainnet
        with:
          command: ccip-estimate-fee
          source-chain: base
          destination-chain: ethereum
          receiver: '0xe4E402962943c4EB2253f666575eE12700e78e90'
          fee-token: native
          rpc-url: https://base-rpc.publicnode.com

      - uses: w3-io/w3-chainlink-action@main
        id: ccip-fee-testnet
        with:
          command: ccip-estimate-fee
          source-chain: base-sepolia
          destination-chain: sepolia
          receiver: '0xe4E402962943c4EB2253f666575eE12700e78e90'
          fee-token: native
          rpc-url: https://base-sepolia-rpc.publicnode.com

      - run: |
          echo "=== CCIP Fee: base → ethereum ==="
          echo "${{ steps.ccip-fee-mainnet.outputs.result }}"
          echo "=== CCIP Fee: base-sepolia → sepolia ==="
          echo "${{ steps.ccip-fee-testnet.outputs.result }}"

  # ── CCIP send (write) ───────────────────────────────────────────
  # ccip-send code path is fixed (buildCcipMessage emits JSON arrays,
  # receipt is unwrapped, txHash is extracted). Commented out until
  # we have a stable testnet RPC — public RPCs for Base Sepolia
  # rate-limit at the second contract write, and mainnet would
  # burn real ETH. Re-enable with a paid Alchemy/Infura key:
  #
  # ccip-send-demo:
  #   runs-on: ubuntu-latest
  #   steps:
