# E2E Test Workflow
#
# Exercises every command against real APIs/contracts.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "Chainlink E2E" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_ETHEREUM (bridge signer for write commands)
#   - VRF/Functions commands need funded subscriptions (see comments)

name: Chainlink E2E
on:
  workflow_dispatch: {}

jobs:
  # ── Price Feeds (read-only) ─────────────────────────────────────
  price-feeds:
    runs-on: ubuntu-latest
    steps:
      # get-price: ETH/USD
      - uses: w3-io/w3-chainlink-action@main
        id: eth-price
        with:
          command: get-price
          pair: ETH/USD
          chain: base

      # get-price: BTC/USD
      - uses: w3-io/w3-chainlink-action@main
        id: btc-price
        with:
          command: get-price
          pair: BTC/USD
          chain: base

      # get-price: LINK/USD
      #       - uses: w3-io/w3-chainlink-action@main
      #         id: link-price
      #         with:
      #           command: get-price
      #           pair: LINK/USD
      #           chain: base

      # get-feed-info: ETH/USD
      - uses: w3-io/w3-chainlink-action@main
        id: feed-info
        with:
          command: get-feed-info
          pair: ETH/USD
          chain: base

      # list-feeds
      - uses: w3-io/w3-chainlink-action@main
        id: list-feeds
        with:
          command: list-feeds
          chain: base

      - run: |
          echo "=== ETH/USD ==="
          echo "${{ steps.eth-price.outputs.result }}"
          echo "=== BTC/USD ==="
          echo "${{ steps.btc-price.outputs.result }}"
      #           echo "=== LINK/USD ==="
      #           echo "${{ steps.link-price.outputs.result }}"
          echo "=== Feed Info ==="
          echo "${{ steps.feed-info.outputs.result }}"
          echo "=== List Feeds ==="
          echo "${{ steps.list-feeds.outputs.result }}"

