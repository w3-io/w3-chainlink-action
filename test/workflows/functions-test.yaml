name: Chainlink Functions Test v2
on:
  workflow_dispatch: {}

jobs:
  reads:
    runs-on: ubuntu-latest
    steps:
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: func-get
        with:
          command: functions-get-subscription
          subscription-id: '1'
          chain: sepolia
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      - run: |
          echo "Functions sub: ${{ steps.func-get.outputs.result }}"
