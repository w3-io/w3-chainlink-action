name: Chainlink PoR Mainnet v1
on:
  workflow_dispatch: {}

jobs:
  reads:
    runs-on: ubuntu-latest
    steps:
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: por
        with:
          command: por-get-reserves
          pair: WBTC/BTC
          chain: ethereum
          rpc-url: https://eth-mainnet.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      - run: |
          echo "PoR: ${{ steps.por.outputs.result }}"
