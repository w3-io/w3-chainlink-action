name: Chainlink All Commands v1
on:
  workflow_dispatch: {}

jobs:
  reads:
    runs-on: ubuntu-latest
    steps:
      # ── Price Feeds ──────────────────────────────────────────
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: eth-price
        with:
          command: get-price
          pair: ETH/USD
          chain: sepolia
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: feed-info
        with:
          command: get-feed-info
          pair: ETH/USD
          chain: sepolia
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: feeds-list
        with:
          command: list-feeds
          chain: sepolia

      # ── CCIP read ────────────────────────────────────────────
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: ccip-fee
        with:
          command: ccip-estimate-fee
          source-chain: sepolia
          destination-chain: base-sepolia
          receiver: '0x5bC6a8220Fd1645970B467092896B5f98bc339dC'
          fee-token: native
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      # ── VRF write: create subscription ───────────────────────
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: vrf-create
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: vrf-create-subscription
          chain: sepolia
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      # ── VRF write: add consumer to a known subscription ──────
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: vrf-add
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: vrf-add-consumer
          subscription-id: '66004841450484626242556180184864101659150760494059007276137868572443120347363'
          consumer-contract: '0x5bC6a8220Fd1645970B467092896B5f98bc339dC'
          chain: sepolia
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      # ── VRF read: get subscription we created earlier ────────
      - uses: w3-io/w3-chainlink-action@audie/tier-1-price-feeds
        id: vrf-get
        with:
          command: vrf-get-subscription
          subscription-id: '66004841450484626242556180184864101659150760494059007276137868572443120347363'
          chain: sepolia
          rpc-url: https://eth-sepolia.g.alchemy.com/v2/0L3k1EjL5mpti6pqRUi1y

      # ── Summary ──────────────────────────────────────────────
      - run: |
          echo "=== Results ==="
          echo "ETH: ${{ steps.eth-price.outputs.result }}"
          echo "Info: ${{ steps.feed-info.outputs.result }}"
          echo "List: ${{ steps.feeds-list.outputs.result }}"
          echo "Fee: ${{ steps.ccip-fee.outputs.result }}"
          echo "Create: ${{ steps.vrf-create.outputs.result }}"
          echo "Add: ${{ steps.vrf-add.outputs.result }}"
          echo "Get: ${{ steps.vrf-get.outputs.result }}"
