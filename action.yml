name: 'W3 Chainlink Action'
description: 'Chainlink on-chain primitives for W3 workflows — price feeds, CCIP cross-chain transfers, VRF randomness, Functions off-chain compute, proof of reserve, and data streams.'
author: 'w3-io'

inputs:
  command:
    description: >
      Operation to perform. Price Feeds: get-price, get-feed-info, get-round-data, list-feeds.
      Proof of Reserve: por-get-reserves.
      CCIP: ccip-send, ccip-estimate-fee, ccip-get-message, ccip-wait-for-delivery.
      VRF: vrf-create-subscription, vrf-fund-subscription, vrf-add-consumer,
      vrf-remove-consumer, vrf-get-subscription, vrf-request,
      vrf-wait-for-fulfillment.
      Functions: functions-create-subscription, functions-get-subscription,
      functions-request, functions-wait-for-fulfillment.
    required: true

  # Common inputs
  chain:
    description: 'Target chain: ethereum, sepolia, base, arbitrum, polygon, avalanche, and their testnets.'
    required: false
  pair:
    description: 'Price pair for feed commands (e.g. "ETH/USD", "BTC/USD").'
    required: false
  feed-address:
    description: 'Direct feed contract address (bypasses the built-in registry). Use for feeds not in the curated list.'
    required: false
  round-id:
    description: 'Round ID for get-round-data command. Fetch historical price data for a specific round.'
    required: false

  # RPC provider
  rpc-url:
    description: 'Custom RPC endpoint URL. Overrides the default public RPC for the target chain. Recommended for reliability (e.g. Alchemy, Infura).'
    required: false

  # CCIP inputs
  source-chain:
    description: 'Source chain for CCIP sends.'
    required: false
  destination-chain:
    description: 'Destination chain for CCIP sends.'
    required: false
  token:
    description: 'Token symbol for CCIP transfers (e.g. "USDC", "LINK").'
    required: false
  amount:
    description: 'Amount in base units for CCIP transfers.'
    required: false
  receiver:
    description: 'Receiver address on the destination chain.'
    required: false
  message-id:
    description: 'CCIP message ID for ccip-wait-for-delivery / ccip-get-message.'
    required: false
  offramp:
    description: 'Destination-chain OffRamp address for ccip-get-message.'
    required: false
  from-block:
    description: 'Start block for event scan (default "0").'
    required: false
  to-block:
    description: 'End block for event scan (default "latest").'
    required: false
  token-amounts:
    description: 'JSON array of {token, amount} objects for CCIP token transfers.'
    required: false
  fee-token:
    description: 'Fee token for CCIP: "native" (default), "link", or a token address.'
    required: false
    default: 'native'
  gas-limit:
    description: 'Gas limit for CCIP destination execution (default 200000).'
    required: false
    default: '200000'

  # VRF inputs
  subscription-id:
    description: 'VRF or Functions subscription ID.'
    required: false
  consumer-contract:
    description: 'Consumer contract address for VRF.'
    required: false
  num-words:
    description: 'Number of random words to request from VRF (default 1).'
    required: false
    default: '1'
  callback-gas-limit:
    description: 'Gas limit for VRF callback (default 100000).'
    required: false
    default: '100000'
  request-confirmations:
    description: 'Block confirmations before VRF fulfillment (default 3).'
    required: false
    default: '3'

  # Functions inputs
  source-code:
    description: 'JavaScript source code for Chainlink Functions requests.'
    required: false
  args:
    description: 'JSON array of string arguments for Functions source code.'
    required: false
  secrets:
    description: 'JSON object of secrets for Functions source code.'
    required: false

  # Data Streams (Tier 4)
  feed-id:
    description: 'Data Streams feed ID (hex, e.g. 0x0003...) for streams-fetch-report.'
    required: false
  timestamp:
    description: 'UNIX timestamp (seconds) for streams-fetch-report at a specific moment. Omit for latest.'
    required: false
  streams-client-id:
    description: 'Chainlink Data Streams client ID (UUID) issued at onboarding.'
    required: false
  streams-client-secret:
    description: 'Chainlink Data Streams client secret (HMAC key).'
    required: false
  streams-api-url:
    description: 'Data Streams REST base URL. Defaults to mainnet. Set to testnet URL for testing.'
    required: false

  # Async fulfillment
  request-id:
    description: 'Request ID for VRF or Functions wait-for-fulfillment.'
    required: false
  timeout:
    description: 'Polling timeout in seconds for wait-for-* commands (default 300).'
    required: false
    default: '300'
  poll-interval:
    description: 'Polling interval in seconds for wait-for-* commands (default varies by command).'
    required: false

outputs:
  result:
    description: 'JSON result of the operation. Schema documented per command in docs/guide.md.'

runs:
  using: 'node24'
  main: 'dist/index.js'
